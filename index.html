<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors Game</title>
</head>
<body>
    <h1 id="heading">Rock Paper Scissors</h1>
    <div class="choices">
        <div id="rock" class="choice">
            <img id="img" src="./images/rock-icon-set-on-white-background-vector.jpg" alt="Rock">
        </div>
        <div id="paper" class="choice">
            <img id="img" src="./images/paper-icon-set-on-white-background-vector.jpg" alt="Paper">
        </div>
        <div id="scissor" class="choice">
            <img id="img" src="./images/scissor-icon-set-on-white-background-vector.jpg" alt="Scissor">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>User</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>Computer</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Play Your Move</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
